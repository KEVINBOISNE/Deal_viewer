<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Deal Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto p-8">

  <h1 class="text-3xl font-bold mb-8 text-center">Deal Viewer Dashboard</h1>

  <!-- Health Check -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-4">Health Check</h2>
    <button onclick="healthCheck()"
      class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Ping API</button>
    <pre id="healthResult" class="mt-4 text-sm"></pre>
  </div>

  <!-- Deals -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-4">Deals</h2>

    <select id="dealSelect" class="border p-2 rounded w-full mb-3">
      <option value="">-- Sélectionnez un deal --</option>
    </select>

    <button onclick="loadDeals()"
      class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Load Deals</button>

    <pre id="dealResult" class="mt-4 text-sm"></pre>
  </div>

  <!-- Upload Template -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-4">Upload Template</h2>
    <input id="templateFile" type="file" class="border p-2 rounded w-full mb-3">
    <button onclick="insertTemplate()"
      class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">Upload</button>
    <pre id="insertResult" class="mt-4 text-sm"></pre>
  </div>

  <!-- Update Template -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-4">Update Template</h2>
    <input id="updateId" placeholder="Template ID" class="border p-2 rounded w-full mb-3">
    <textarea id="updateBody" placeholder='{"name":"new name"}'
      class="border p-2 rounded w-full mb-3 h-24"></textarea>
    <button onclick="updateTemplate()"
      class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Update</button>
    <pre id="updateResult" class="mt-4 text-sm"></pre>
  </div>

  <!-- Delete Template -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="text-xl font-semibold mb-4">Delete Template</h2>
    <input id="deleteId" placeholder="Template ID" class="border p-2 rounded w-full mb-3">
    <button onclick="deleteTemplate()"
      class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Delete</button>
    <pre id="deleteResult" class="mt-4 text-sm"></pre>
  </div>

</div>

<script>
const API = "http://127.0.0.1:8000"

// Health Check
async function healthCheck() {
  const res = await fetch(API + "/health-check/")
  const data = await res.json()
  document.getElementById("healthResult").innerText = JSON.stringify(data, null, 2)
}

// Load Deals into dropdown
async function loadDeals() {
  const res = await fetch(API + "/get-deal/")
  const deals = await res.json()

  const select = document.getElementById("dealSelect")
  select.innerHTML = '<option value="">-- Sélectionnez un deal --</option>'
  deals.forEach(deal => {
    const option = document.createElement("option")
    option.value = deal._id
    option.text = deal.title || deal.reference || deal._id
    select.appendChild(option)
  })

  document.getElementById("dealResult").innerText = JSON.stringify(deals, null, 2)
}

// Insert Template
async function insertTemplate() {
  const fileInput = document.getElementById("templateFile")
  const formData = new FormData()
  formData.append("file", fileInput.files[0])

  const res = await fetch(API + "/insert-template/", { method: "POST", body: formData })
  const data = await res.json()
  document.getElementById("insertResult").innerText = JSON.stringify(data, null, 2)
}

// Update Template
async function updateTemplate() {
  const id = document.getElementById("updateId").value
  const body = document.getElementById("updateBody").value

  const res = await fetch(API + "/update-template/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: body
  })
  const data = await res.json()
  document.getElementById("updateResult").innerText = JSON.stringify(data, null, 2)
}

// Delete Template
async function deleteTemplate() {
  const id = document.getElementById("deleteId").value
  const res = await fetch(API + "/delete-template/" + id, { method: "DELETE" })
  const data = await res.json()
  document.getElementById("deleteResult").innerText = JSON.stringify(data, null, 2)
}
</script>

</body>
</html>
